<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile | Attendance System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="fas fa-user-check me-2 text-info"></i>Attendance System
        </a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card shadow border-0 rounded-4 overflow-hidden">
                <div class="bg-info py-4 text-center">
                    <i class="fas fa-user-circle fa-5x text-white"></i>
                </div>
                
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-dark mb-1">{{ student.name }}</h3>
                        <span class="text-muted small uppercase">Student Record Information</span>
                    </div>

                    <hr class="opacity-25">

                    <ul class="list-group list-group-flush mb-4">
                        <li class="list-group-item d-flex justify-content-between align-items-center bg-transparent">
                            <span class="text-secondary"><i class="fas fa-id-card me-2"></i>Student ID</span>
                            <span class="fw-bold">{{ student.student_id }}</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center bg-transparent">
                            <span class="text-secondary"><i class="fas fa-calendar-alt me-2"></i>Recorded Date</span>
                            <span class="fw-bold">{{ student.date }}</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center bg-transparent">
                            <span class="text-secondary"><i class="fas fa-signal me-2"></i>Current Status</span>
                            {% if student.status %}
                                <span class="badge rounded-pill bg-success px-3">Present</span>
                            {% else %}
                                <span class="badge rounded-pill bg-danger px-3">Absent</span>
                            {% endif %}
                        </li>
                    </ul>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                        <a href="/" class="btn btn-outline-secondary px-4 rounded-pill">
                            <i class="fas fa-arrow-left me-1"></i> Back to List
                        </a>
                        <a href="/edit/{{student.id}}" class="btn btn-info px-4 rounded-pill shadow-sm text-white">
                            <i class="fas fa-edit me-1"></i> Edit Details
                        </a>
                    </div>
                </div>
            </div>

            <p class="text-center text-muted mt-4 small">
                {{ student.date }}
            </p>

        </div>
    </div>
</div>

</body>
</html>
