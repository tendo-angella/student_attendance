<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Delete | Attendance System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg border-0 text-center rounded-4">
                <div class="card-body p-5">
                    
                    <div class="text-danger mb-3">
                        <i class="fas fa-exclamation-circle fa-4x"></i>
                    </div>

                    <h4 class="text-dark fw-bold mb-3">Delete Confirmation</h4>

                    <p class="text-muted">Are you sure you want to permanently delete the record for:</p>
                    
                    <div class="bg-light p-3 rounded-3 mb-4">
                        <h5 class="fw-bold text-primary mb-1">{{ student.name }}</h5>
                        <small class="text-secondary">ID: {{ student.student_id }}</small>
                    </div>

                    <form method="POST" class="mt-4">
                        {% csrf_token %}

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg rounded-pill shadow-sm">
                                <i class="fas fa-trash-alt me-2"></i>Delete Record
                            </button>
                            <a href="/" class="btn btn-outline-secondary btn-lg rounded-pill mt-2">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </form>

                </div>
            </div>

            <p class="text-center text-muted mt-4 small">
                &copy; 2026 Attendance Management System
            </p>

        </div>
    </div>
</div>

</body>
</html>
