<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Student</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
</head>

<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand font-weight-bold" href="/">
        <i class="fas fa-user-graduate mr-2"></i>Attendance System
      </a>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0">
          <div class="card-body">

            <h4 class="mb-4 text-center font-weight-bold">
              <i class="fas fa-user-edit text-info mr-2"></i>
              Edit Student Details
            </h4>

            <form action="" method="POST">
              {% csrf_token %}

              <div class="form-group">
                <label>Name</label>
                <input name="name" type="text"
                  class="form-control"
                  value="{{ student.name }}" placeholder="Enter name" required />
              </div>

              <div class="form-group">
                <label>Student ID</label>
                <input name="student_id" type="text"
                  class="form-control"
                  value="{{ student.student_id }}" placeholder="Enter ID" required />
              </div>

              <div class="form-group">
                <label>Date</label>
                <input name="date" type="date"
                  class="form-control"
                  value="{{ student.date|date:'Y-m-d' }}" required />
              </div>

              <div class="form-group">
                <label>Status</label>
                <select name="is_present" class="form-control">
                    <option value="True" {% if student.status %}selected{% endif %}>Present</option>
                    <option value="False" {% if not student.status %}selected{% endif %}>Absent</option>
                </select>
              </div>

              <div class="d-flex justify-content-between">
                <a href="/" class="btn btn-outline-secondary">
                  <i class="fas fa-arrow-left mr-1"></i> Back
                </a>
                <button type="submit" class="btn btn-info">
                  <i class="fas fa-save mr-1"></i> Save Changes
                </button>
              </div>

            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
