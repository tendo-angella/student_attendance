<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Student | Attendance System</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">
          <i class="fas fa-clipboard-check mr-2"></i>Attendance System
        </a>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card shadow border-0">
            <div class="card-body p-4">
              <h4 class="mb-4 text-center font-weight-bold text-dark">
                <i class="fas fa-plus-circle text-info mr-2"></i>
                Create New Student
              </h4>

              <form action="" method="POST">
                {% csrf_token %}

                <div class="form-group">
                  <label class="font-weight-bold">Full Name</label>
                  <input name="name" type="text" class="form-control" placeholder="e.g. John Doe" required />
                </div>

                <div class="form-group">
                  <label class="font-weight-bold">Student ID</label>
                  <input name="student_id" type="text" class="form-control" placeholder="e.g. STU-101" required />
                </div>

                <div class="form-group">
                  <label class="font-weight-bold">Attendance Date</label>
                  <input name="date" type="date" class="form-control" required />
                </div>

                <div class="form-group">
                  <label class="font-weight-bold">Attendance Status</label>
                  <select name="is_present" class="form-control" required>
                    <option value="" disabled selected>Select status...</option>
                    <option value="present">Present</option> <option value="absent">Absent</option>
                  </select>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-between">
                  <a href="/" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left mr-1"></i> Cancel
                  </a>
                  <button type="submit" class="btn btn-info px-4">
                    <i class="fas fa-check mr-1"></i> Add Student
                  </button>
                </div>
              </form>

            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
